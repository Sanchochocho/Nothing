<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nothing</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div class="main">
        <label for="volume" id="text">Rate your mood:</label>
        <div class="rate">
            <div class="stickers">
                <img src="./images/sad.png" alt="" class="sad">
                <img src="./images/normal.png" alt="" class="normal">
                <img src="./images/happy.png" alt="" class="happy">
            </div>
            <input type="range" id="change_mood" min="0" max="100">
        </div>
        <button class="check">Check</button>
    </div>
    <script src="./index.js"></script>
</body>

</html>
